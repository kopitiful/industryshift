name: Weekly Sector Update

on:
  schedule:
    - cron: '0 22 * * 5'  # Freitags 22:00 UTC (nach US-Börsenschluss)
  workflow_dispatch:       # Manueller Start jederzeit möglich

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - run: python compute.py

      - name: Commit und Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/sectors.json
          git diff --staged --quiet || git commit -m "Sektor-Update $(date -u +%Y-%m-%d)"
          git push
